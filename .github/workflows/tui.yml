name: TUI Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "anki_cli/tui/**"
      - "tests/tui/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev --extra tui --frozen
      - run: uv run pytest -m tui